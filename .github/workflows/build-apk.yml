name: Build APK

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Descargar modelo Vosk español
        run: |
          curl -L -o /tmp/vosk-model.zip \
            "https://alphacephei.com/vosk/models/vosk-model-small-es-0.42.zip"
          unzip /tmp/vosk-model.zip -d /tmp/vosk/
          mv /tmp/vosk/vosk-model-small-es-0.42 app/src/main/assets/model-es

      - name: Dar permisos a gradlew
        run: chmod +x gradlew

      - name: Compilar APK debug
        run: ./gradlew assembleDebug --no-daemon

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Omnisciente-con-voz
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
